services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arrival
      POSTGRES_USER: arrival
      POSTGRES_PASSWORD: arrival_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrival"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
